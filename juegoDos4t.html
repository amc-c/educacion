<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Dos 4º Básico</title>
    <link rel="stylesheet" href="css/juegoDos4t.css">
</head>
<body>
<main>
    <div class="page-header">
        <h1>Mayor o menor</h1>
        <p>Observa la recta numérica y elige con cuidado: tienes un intento por pregunta.</p>
    </div>

    <section class="game-panel">
        <div class="info-box">
            <strong>Instrucción:</strong>
            Lee la pregunta, compara las posiciones en la recta numérica y toca la respuesta cuando estés seguro.
        </div>

        <div class="linea-num" id="questionText"></div>
        <div class="number-line-card">
            <div class="number-line" id="numberLine"></div>
            <div class="number-line-labels">
                <span id="lineMin">0</span>
                <span id="lineMax">10.000</span>
            </div>
        </div>

        <div class="answer-row" id="answers"></div>

        <div class="actions">
            <button class="button" id="newQuestion">Nueva pregunta</button>
            <a class="link-box" href="lista.html">Volver a selección</a>
        </div>

        <div id="resultBox" class="result-box"></div>
    </section>
</main>
<script src="js/juegoDos4t.js"></script>
</body>
</html>
