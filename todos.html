<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otros Proyectos - Matemáticas</title>
    <link rel="icon" href="img/icon.png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            color: #1e293b;
            padding: 30px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: 5px solid #fff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            color: #1e3a8a;
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-top: 0;
            margin-bottom: 15px;
        }

        .intro {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 40px;
        }

        .empty-area {
            min-height: 250px;
            border: 3px dashed #cbd5e1;
            border-radius: 20px;
            background: rgba(248, 250, 252, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .empty-text {
            color: #94a3b8;
            font-size: 1.2rem;
            font-style: italic;
        }

        .btn-back {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            background-color: #f1f5f9;
            color: #475569;
            border: 2px solid #cbd5e1;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-back:hover {
            background-color: #e2e8f0;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Otros Proyectos</h1>
        <p class="intro">Espacio reservado para los proyectos y trabajos del curso.</p>

        <!-- Espacio en blanco reservado para agregar links -->
        <div class="empty-area">
            <span class="empty-text">El espacio se encuentra vacío. El profesor agregará los enlaces aquí.</span>
        </div>

        <a href="index.html" class="btn-back">Volver al Inicio</a>
    </div>
</body>
</html>
