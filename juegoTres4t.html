<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Tres 4º Básico</title>
    <link rel="stylesheet" href="css/juegoTres4t.css">
</head>
<body>
<main>
    <div class="page-header">
        <h1>Tabla posicional</h1>
        <p>Observa las casillas mezcladas, reconoce cada posición y escribe el número correcto.</p>
    </div>

    <section class="game-panel">
        <div class="info-box">
            <strong>Instrucción:</strong>
            Las casillas aparecen en orden aleatorio. Busca unidades de mil, centenas, decenas y unidades para formar el número.
        </div>

        <div id="questionLabel" class="linea-num"></div>
        <div id="placeTable" class="table-posicional"></div>
        <div id="representationPanel" class="representation-panel"></div>

        <div class="answer-row">
            <input type="text" id="studentNumber" placeholder="Escribe el número" autocomplete="off">
            <button class="button" id="checkNumber">Comprobar</button>
        </div>

        <div class="actions">
            <button class="button secondary" id="showWord">Mostrar lectura</button>
            <button class="button secondary" id="resetNumber">Nuevo número</button>
            <a class="link-box" href="lista.html">Volver a selección</a>
        </div>

        <div id="resultBox" class="result-box"></div>
    </section>
</main>
<script src="js/juegoTres4t.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        const audio = new Audio('sonidos/interfazLogin.mp3');
        audio.play().catch(err => console.log('Error al reproducir sonido de entrada:', err));
    });
</script>
</body>
</html>
