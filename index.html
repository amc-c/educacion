<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso</title>

    <link rel="icon" href="img/icon.png">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="contenedor">

    <h1>¡Bienvenido!</h1>

    <img src="img/logo.png" class="logo">

    <p>Escribe tu nombre:</p>
    <input type="text" id="nombre" autocomplete="off">

    <p>Elige tu avatar:</p>

    <div class="avatares">
        <img src="img/avatar1.png" onclick="seleccionarAvatar(this)">
        <img src="img/avatar2.png" onclick="seleccionarAvatar(this)">
        <img src="img/avatar3.png" onclick="seleccionarAvatar(this)">
    </div>

    <button onclick="ingresar()">Ingresar</button>
    <div style="margin-top: 14px;">
        <a href="todos.html" style="display: inline-block; padding: 10px; width: 100%; border: 2px solid #55e4f7; border-radius: 10px; color: #172554; text-decoration: none; font-size: 15px; font-weight: bold; box-sizing: border-box; transition: background 0.3s, color 0.3s;" onmouseover="this.style.background='#55e4f7'; this.style.color='#ffffff'" onmouseout="this.style.background='none'; this.style.color='#172554'">Ver todos los juegos</a>
    </div>

</div>

<!-- 🔊 SONIDOS (efectos cortos) -->
<audio id="audioError" src="sonidos/error.mp3" preload="auto"></audio>
<audio id="audioAvatar" src="sonidos/avatar.mp3" preload="auto"></audio>
<audio id="audioCorrecto" src="sonidos/correcto.mp3" preload="auto"></audio>

<script src="js/script.js"></script>

</body>
</html>
